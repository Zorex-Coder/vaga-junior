<div class="combustivel-container">
    <h2>Gerenciar Tipos de Combustível</h2>

    <div class="form-card">
        <h3>Cadastrar / Editar</h3>
        <form id="form-combustivel">
            <input type="hidden" id="combustivel-id">

            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required placeholder="Ex: Gasolina Comum">
            </div>

            <div class="form-group">
                <label for="preco">Preço por Litro (R$):</label>
                <input type="number" id="preco" step="0.01" required placeholder="Ex: 5.49">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <button type="button" id="btn-cancelar" class="btn btn-secondary hidden">Cancelar</button>
            </div>
        </form>
    </div>

    <div class="list-card">
        <h3>Combustíveis Cadastrados</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço (R$)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-combustiveis">
                <!-- Preenchido via JS -->
            </tbody>
        </table>
    </div>
</div>
